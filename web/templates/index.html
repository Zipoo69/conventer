<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>PDF → DOCX Converter</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: #1e293b;
            padding: 40px;
            border-radius: 16px;
            width: 420px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        h1 {
            font-size: 22px;
            margin-bottom: 20px;
        }

        input[type="file"] {
            margin: 20px 0;
            width: 100%;
            padding: 10px;
            background: #334155;
            border-radius: 8px;
            color: white;
            border: none;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #3b82f6;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #2563eb;
        }

        .hint {
            font-size: 12px;
            color: #94a3b8;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="card">
    <h1>📄 PDF → DOCX Converter</h1>

    <form action="/convert" method="post" enctype="multipart/form-data">
        <input type="file" name="file" accept=".pdf" required>
        <button type="submit">Převést soubor</button>
    </form>

    <div class="hint">
        Vyber PDF soubor a stáhne se Word (.docx)
    </div>
</div>

</body>
</html>
