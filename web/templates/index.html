<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF → Word konverter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #f5f5f3;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      border: 0.5px solid #e0e0da;
      padding: 2rem;
      width: 100%;
      max-width: 560px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 2rem;
    }

    .logo {
      width: 36px; height: 36px;
      background: #1a1a1a;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .logo svg { width: 20px; height: 20px; }

    .header-text h1 {
      font-size: 17px;
      font-weight: 500;
      line-height: 1.2;
    }

    .header-text p {
      font-size: 13px;
      color: #888;
    }

    .drop-zone {
      border: 1.5px dashed #ccc;
      border-radius: 12px;
      padding: 2.5rem 1.5rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      background: #fafaf8;
      position: relative;
      margin-bottom: 1.25rem;
    }

    .drop-zone:hover, .drop-zone.drag-over {
      border-color: #999;
      background: #f0f0ee;
    }

    .drop-zone input[type="file"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }

    .drop-icon {
      width: 44px; height: 44px;
      margin: 0 auto 12px;
      background: #fff;
      border: 0.5px solid #e0e0da;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
    }

    .drop-icon svg { width: 22px; height: 22px; color: #888; }

    .drop-label {
      font-size: 15px;
      font-weight: 500;
      margin-bottom: 4px;
    }

    .drop-sub {
      font-size: 13px;
      color: #888;
    }

    .file-pill {
      display: none;
      align-items: center;
      gap: 10px;
      background: #fafaf8;
      border: 0.5px solid #e0e0da;
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 1.25rem;
      font-size: 13px;
    }

    .file-pill.visible { display: flex; }

    .file-pill-icon {
      width: 32px; height: 32px;
      background: #FCEBEB;
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .file-pill-icon svg { width: 16px; height: 16px; color: #A32D2D; }

    .file-pill-name {
      flex: 1;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .file-pill-size {
      color: #888;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
    }

    .remove-btn {
      background: none; border: none; cursor: pointer;
      color: #aaa;
      padding: 2px; line-height: 1;
      transition: color 0.15s;
    }
    .remove-btn:hover { color: #1a1a1a; }

    .preview-wrap {
      display: none;
      border: 0.5px solid #e0e0da;
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 1.25rem;
      background: #fafaf8;
    }

    .preview-wrap.visible { display: block; }

    .preview-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 14px;
      border-bottom: 0.5px solid #e0e0da;
      font-size: 12px;
      color: #888;
    }

    .preview-wrap iframe {
      width: 100%;
      height: 400px;
      border: none;
      display: block;
    }

    .convert-btn {
      width: 100%;
      padding: 13px;
      font-size: 15px;
      font-weight: 500;
      font-family: 'DM Sans', sans-serif;
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }

    .convert-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .convert-btn:not(:disabled):hover { opacity: 0.85; }
    .convert-btn:not(:disabled):active { transform: scale(0.99); }

    .convert-btn svg { width: 18px; height: 18px; }

    .status-row {
      display: none;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #888;
      margin-top: 10px;
    }

    .status-row.visible { display: flex; }

    .spinner {
      width: 14px; height: 14px;
      border: 1.5px solid #ddd;
      border-top-color: #1a1a1a;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="logo">
        <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M4 2h8l4 4v12H4V2z" stroke="white" stroke-width="1.5" stroke-linejoin="round"/>
          <path d="M12 2v4h4" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M7 10h6M7 13h4" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="header-text">
        <h1>PDF → Word konverter</h1>
        <p>Nahraj PDF, stáhni .docx</p>
      </div>
    </div>

    <form id="convertForm" action="/convert" method="post" enctype="multipart/form-data">
      <div class="drop-zone" id="dropZone">
        <input type="file" id="fileInput" name="file" accept="application/pdf" required>
        <div class="drop-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 16V4M12 4l-4 4M12 4l4 4"/>
            <path d="M4 20h16"/>
          </svg>
        </div>
        <p class="drop-label">Přetáhni PDF sem</p>
        <p class="drop-sub">nebo klikni pro výběr souboru</p>
      </div>

      <div class="file-pill" id="filePill">
        <div class="file-pill-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <path d="M14 2v6h6"/>
          </svg>
        </div>
        <span class="file-pill-name" id="fileName">—</span>
        <span class="file-pill-size" id="fileSize"></span>
        <button type="button" class="remove-btn" id="removeBtn" title="Odebrat">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
            <path d="M4 4l8 8M12 4l-8 8"/>
          </svg>
        </button>
      </div>

      <div class="preview-wrap" id="previewWrap">
        <div class="preview-bar">
          <span>Náhled</span>
          <span id="previewName" style="font-family:'DM Mono',monospace;"></span>
        </div>
        <iframe id="preview"></iframe>
      </div>

      <button type="submit" class="convert-btn" id="convertBtn" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 12h6M12 9v6M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0z"/>
        </svg>
        Převést a stáhnout
      </button>

      <div class="status-row" id="statusRow">
        <div class="spinner"></div>
        <span>Konvertuji, prosím čekej…</span>
      </div>
    </form>
  </div>

  <script>
    const fileInput = document.getElementById('fileInput');
    const dropZone = document.getElementById('dropZone');
    const filePill = document.getElementById('filePill');
    const fileName = document.getElementById('fileName');
    const fileSize = document.getElementById('fileSize');
    const removeBtn = document.getElementById('removeBtn');
    const previewWrap = document.getElementById('previewWrap');
    const previewFrame = document.getElementById('preview');
    const previewName = document.getElementById('previewName');
    const convertBtn = document.getElementById('convertBtn');
    const statusRow = document.getElementById('statusRow');
    const form = document.getElementById('convertForm');

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    function setFile(file) {
      if (!file || file.type !== 'application/pdf') return;
      fileName.textContent = file.name;
      fileSize.textContent = formatSize(file.size);
      previewName.textContent = file.name;
      filePill.classList.add('visible');
      previewWrap.classList.add('visible');
      previewFrame.src = URL.createObjectURL(file);
      convertBtn.disabled = false;
    }

    function clearFile() {
      fileInput.value = '';
      filePill.classList.remove('visible');
      previewWrap.classList.remove('visible');
      previewFrame.src = '';
      convertBtn.disabled = true;
      statusRow.classList.remove('visible');
    }

    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) setFile(file);
    });

    removeBtn.addEventListener('click', clearFile);

    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('drag-over');
    });

    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));

    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      const file = e.dataTransfer.files[0];
      if (file) {
        const dt = new DataTransfer();
        dt.items.add(file);
        fileInput.files = dt.files;
        setFile(file);
      }
    });

    form.addEventListener('submit', () => {
      convertBtn.disabled = true;
      statusRow.classList.add('visible');
    });
  </script>
</body>
</html>
